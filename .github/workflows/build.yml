name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write    # need write so audio job can commit synthesized MP3s back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate content schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate

  audio:
    name: Synthesize audio (incremental)
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Synthesize new/changed audio clips
        env:
          AZURE_TTS_KEY: ${{ secrets.AZURE_TTS_KEY }}
          AZURE_TTS_REGION: ${{ secrets.AZURE_TTS_REGION }}
        run: npm run build:audio
      - name: Commit synthesized audio if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio/ data/audio-manifest.json
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No new audio clips."
          else
            git commit -m "chore: synthesize audio clips [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build site
    needs: [validate, audio]
    # `audio` only runs on push-to-main; on PR / dispatch we still want build
    # to run, so don't fail when audio was skipped.
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.audio.result == 'success' || needs.audio.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      # Default checkout behaviour is correct for both push and pull_request:
      # - push to main:  refs/heads/main HEAD (includes the audio commit if
      #                  the audio job pushed one — main was already updated).
      # - pull_request:  github.event.pull_request.head.sha (the PR tip).
      # Previously this used `ref: ${{ github.ref }}` which on PRs becomes
      # `refs/pull/N/merge` (a virtual merge ref). When the PR is merged
      # quickly via gh pr merge --delete-branch, that ref disappears and
      # the checkout fails before the run finishes.
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload built site
        uses: actions/upload-artifact@v5
        with:
          name: site
          path: |
            index.html
            pages/
            data/
            og/
            assets/
            audio/
            style.css
            scripts/
            sitemap.xml
            robots.txt
            feed.xml
            manifest.webmanifest
            sw.js
            icons/
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: Playwright E2E (Today page)
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Download built site
        uses: actions/download-artifact@v5
        with:
          name: site
      # Playwright config webServer: { command: 'python3 -m http.server 4173' }.
      # python3 is preinstalled on ubuntu-latest runners.
      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Run e2e suite
        run: npm run test:e2e
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  check:
    name: Post-build invariants & link check
    needs: build
    # Without `if: always()`, GitHub default-skips this job whenever any
    # transitively-needed job (e.g. `audio`) has a non-success result —
    # which on PR runs always happens because audio is push-only-skipped.
    # Keep running check whenever build succeeded.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Download built site
        uses: actions/download-artifact@v5
        with:
          name: site
      - run: npm run check

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: [build, check, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
