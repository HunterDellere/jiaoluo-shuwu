<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: papyrus -->
  <rect width="1200" height="630" fill="#f2e8d5"/>
  <!-- Top rule: cinnabar → ochre (matches site top border) -->
  <rect x="0" y="0" width="1200" height="4" fill="#8b1a1a"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#topRule)"/>
  <defs>
    <linearGradient id="topRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#c07830"/>
    </linearGradient>
  </defs>
  <!-- Large glyph watermark: 書 (shū, book) -->
  <text x="970" y="530" font-family="'Noto Serif SC', 'Songti SC', serif"
        font-size="460" font-weight="400"
        fill="#8b1a1a" opacity="0.08" text-anchor="middle">書</text>
  <!-- Eyebrow -->
  <text x="100" y="160" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="26" font-weight="400" fill="#8b1a1a" letter-spacing="6">
    JIǍOLUÒ SHŪWŪ
  </text>
  <!-- Chinese brand title -->
  <text x="100" y="260" font-family="'Noto Serif SC', 'Songti SC', serif"
        font-size="92" font-weight="600" fill="#14110a" letter-spacing="10">
    角落書屋
  </text>
  <!-- Divider -->
  <line x1="100" y1="305" x2="340" y2="305" stroke="#8b1a1a" stroke-width="1.5"/>
  <!-- English tagline -->
  <text x="100" y="370" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="42" font-style="italic" font-weight="300" fill="#2c1f10">
    A reading corner for Chinese
  </text>
  <!-- Description -->
  <text x="100" y="430" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="28" font-weight="300" fill="#5a4428">
    Characters · Vocabulary · Grammar
  </text>
  <text x="100" y="468" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="28" font-weight="300" fill="#5a4428">
    Philosophy · History · Food · Tea
  </text>
  <!-- URL -->
  <text x="100" y="560" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="22" font-weight="400" fill="#a06428" letter-spacing="3">
    jiaoshoo.com
  </text>
</svg>
