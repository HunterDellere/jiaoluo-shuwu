<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;display=swap');
    </style>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf8f4"/>
  <!-- Subtle top border line -->
  <rect x="0" y="0" width="1200" height="4" fill="#8b3a2a"/>
  <!-- Large glyph watermark -->
  <text x="900" y="520" font-family="serif" font-size="480" font-weight="300"
        fill="#8b3a2a" opacity="0.07" text-anchor="middle">字</text>
  <!-- Main title -->
  <text x="100" y="220" font-family="'Cormorant Garamond', 'Georgia', serif"
        font-size="64" font-weight="300" fill="#1a1612" letter-spacing="1">
    Field Notes on Chinese
  </text>
  <!-- Chinese subtitle -->
  <text x="100" y="300" font-family="'Noto Serif SC', serif"
        font-size="36" font-weight="300" fill="#5a4a3a" letter-spacing="8">
    汉语田野笔记
  </text>
  <!-- Divider -->
  <line x1="100" y1="340" x2="400" y2="340" stroke="#8b3a2a" stroke-width="1.5"/>
  <!-- Description -->
  <text x="100" y="390" font-family="'Cormorant Garamond', 'Georgia', serif"
        font-size="28" font-weight="300" fill="#5a4a3a">
    Characters · Language · Civilisation
  </text>
  <!-- URL -->
  <text x="100" y="560" font-family="'Georgia', serif"
        font-size="20" font-weight="300" fill="#8b7a6a" letter-spacing="1">
    hunterdellere.github.io/chinese-field-guide
  </text>
</svg>
